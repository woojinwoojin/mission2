# 5강: Docker Compose 설정
# 로컬 개발 및 Production 배포용 컨테이너 설정
#
# 사용법:
#   # 로컬 개발 (빌드 + 실행)
#   docker-compose up --build
#
#   # Production (GHCR 이미지 사용)
#   LUMI_IMAGE=ghcr.io/owner/repo:tag docker-compose up -d
#
#   # 백그라운드 실행
#   docker-compose up -d
#
#   # 로그 확인
#   docker-compose logs -f
#
#   # 종료
#   docker-compose down
#
# 서비스 구성:
